<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lovci počtů vět</title>
<style>
:root {
  --bg1:#101820;
  --bg2:#21321f;
  --gold:#f2c14e;
  --paper:#fff8e6;
  --ink:#1c1b18;
  --green:#38b000;
  --red:#e63946;
  --panel:rgba(14,18,22,.82);
}
* { box-sizing:border-box; }
body {
  margin:0;
  min-height:100vh;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  color:#fff;
  text-align:center;
  background:
    radial-gradient(circle at 20% 10%, rgba(242,193,78,.18), transparent 25%),
    radial-gradient(circle at 80% 15%, rgba(56,176,0,.12), transparent 28%),
    linear-gradient(135deg, var(--bg1), #111, var(--bg2));
  overflow-x:hidden;
}
body:before {
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
  background-size:34px 34px;
  opacity:.55;
}
.app {
  width:min(980px, 94vw);
  margin:0 auto;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:22px 0;
}
.card {
  width:100%;
  border:1px solid rgba(242,193,78,.35);
  border-radius:26px;
  background:var(--panel);
  box-shadow:0 24px 80px rgba(0,0,0,.55), inset 0 0 0 1px rgba(255,255,255,.05);
  padding:26px;
  backdrop-filter: blur(8px);
}
.logo {
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:8px 16px;
  border-radius:999px;
  background:rgba(242,193,78,.12);
  border:1px solid rgba(242,193,78,.35);
  color:var(--gold);
  font-weight:800;
  letter-spacing:.08em;
  text-transform:uppercase;
  font-size:14px;
}
h1 {
  margin:16px 0 8px;
  font-size:clamp(34px, 6vw, 62px);
  line-height:1;
  text-shadow:0 4px 18px rgba(0,0,0,.65);
}
.subtitle {
  max-width:720px;
  margin:0 auto 22px;
  color:#d8d2c2;
  font-size:clamp(16px, 2.3vw, 20px);
}
.menu-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
  margin-top:24px;
}
.mode-btn, .main-btn, .ghost-btn {
  border:0;
  cursor:pointer;
  border-radius:20px;
  font-weight:900;
  letter-spacing:.04em;
  transition:transform .12s, filter .12s, box-shadow .12s;
}
.mode-btn {
  padding:30px 18px;
  min-height:160px;
  color:#1c1607;
  background:linear-gradient(180deg, #ffd979, var(--gold));
  box-shadow:0 14px 0 #8b5e12, 0 18px 32px rgba(0,0,0,.35);
  font-size:clamp(25px, 4vw, 38px);
}
.mode-btn span {
  display:block;
  margin-top:12px;
  font-size:16px;
  line-height:1.35;
  font-weight:700;
  letter-spacing:0;
  color:#3a2a0b;
}
.mode-btn.secondary {
  background:linear-gradient(180deg, #9be7ff, #4cc9f0);
  box-shadow:0 14px 0 #17647b, 0 18px 32px rgba(0,0,0,.35);
}
.mode-btn:hover, .main-btn:hover, .ghost-btn:hover { transform:translateY(-2px); filter:brightness(1.05); }
.mode-btn:active, .main-btn:active, .ghost-btn:active { transform:translateY(5px); box-shadow:none; }
.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:18px;
}
.badge {
  padding:10px 14px;
  border-radius:999px;
  background:rgba(255,255,255,.09);
  border:1px solid rgba(255,255,255,.14);
  color:#f4ead1;
  font-weight:800;
}
.question-box {
  position:relative;
  margin:16px auto 22px;
  padding:clamp(22px, 4vw, 38px);
  color:var(--ink);
  background:
    linear-gradient(180deg, rgba(255,255,255,.75), rgba(255,255,255,.2)),
    var(--paper);
  border-radius:24px;
  box-shadow:0 16px 0 #b48a38, 0 18px 50px rgba(0,0,0,.35);
  border:2px solid #e0b85d;
}
.question-box:before, .question-box:after {
  content:"";
  position:absolute;
  width:42px;
  height:42px;
  border-radius:50%;
  background:#2b2110;
  opacity:.12;
  top:18px;
}
.question-box:before { left:18px; }
.question-box:after { right:18px; }
.prompt {
  margin:0 0 14px;
  font-weight:900;
  color:#684a12;
  text-transform:uppercase;
  letter-spacing:.08em;
  font-size:13px;
}
.question {
  font-size:clamp(22px, 3.6vw, 36px);
  line-height:1.38;
  font-weight:750;
}
.answer-row {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:14px;
  flex-wrap:wrap;
  margin:20px 0 10px;
}
input[type=number] {
  width:150px;
  height:74px;
  border-radius:20px;
  border:3px solid rgba(242,193,78,.9);
  font-size:42px;
  font-weight:900;
  text-align:center;
  outline:none;
  background:#fffdf5;
  color:#111;
  box-shadow:0 8px 0 #9b741c;
}
input[type=number]:focus {
  border-color:#fff;
  box-shadow:0 0 0 5px rgba(242,193,78,.25), 0 8px 0 #9b741c;
}
.main-btn {
  min-width:180px;
  height:74px;
  padding:0 24px;
  background:linear-gradient(180deg, #66d66b, var(--green));
  color:#061b08;
  box-shadow:0 8px 0 #1f6c23;
  font-size:24px;
}
.ghost-btn {
  margin-top:16px;
  padding:14px 22px;
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.2);
  color:#fff;
  font-size:16px;
}
.feedback {
  min-height:78px;
  margin-top:16px;
  font-size:clamp(26px, 5vw, 46px);
  font-weight:950;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:8px;
}
.feedback.good { color:#92ff7a; text-shadow:0 0 20px rgba(56,176,0,.45); }
.feedback.bad { color:#ff6b6b; text-shadow:0 0 20px rgba(230,57,70,.45); }
.feedback.win { color:var(--gold); text-shadow:0 0 24px rgba(242,193,78,.6); }
.small-feedback {
  font-size:18px;
  color:#f4ead1;
  font-weight:700;
}
.hidden { display:none !important; }
.shake { animation:shake .24s linear 1; }
.pop { animation:pop .28s ease-out 1; }
@keyframes shake {
  0%,100% { transform:translateX(0); }
  25% { transform:translateX(-8px); }
  75% { transform:translateX(8px); }
}
@keyframes pop {
  0% { transform:scale(.92); opacity:.5; }
  100% { transform:scale(1); opacity:1; }
}
@media (max-width:720px) {
  .app { width:96vw; padding:10px 0; align-items:flex-start; }
  .card { padding:18px 14px; border-radius:20px; }
  .menu-grid { grid-template-columns:1fr; }
  .mode-btn { min-height:130px; padding:22px 14px; }
  .topbar { flex-direction:column; align-items:stretch; }
  .badge { font-size:15px; }
  .question-box { padding:22px 16px; }
  .question { font-size:24px; }
  input[type=number] { width:132px; height:66px; font-size:38px; }
  .main-btn { width:132px; min-width:132px; height:66px; font-size:22px; }
}
</style>
</head>
<body>
<div class="app">
  <main class="card">
    <section id="menu">
      <div class="logo">🎯 maturitní trénink</div>
      <h1>Lovci počtů vět</h1>
      <p class="subtitle">Spočítej, kolik vět obsahuje zadané souvětí. Piš pouze číslicí.</p>
      <div class="menu-grid">
        <button class="mode-btn" onclick="startChallenge()">VÝZVA<span>10 správných odpovědí po sobě = jednička</span></button>
        <button class="mode-btn secondary" onclick="startTest()">TEST<span>16 otázek, na konci známka 1–5</span></button>
      </div>
    </section>

    <section id="game" class="hidden">
      <div class="topbar">
        <div class="badge" id="modeBadge">VÝZVA</div>
        <div class="badge" id="progressBadge">Série: 0 / 10</div>
      </div>

      <div class="question-box" id="questionBox">
        <p class="prompt">Kolik vět obsahuje souvětí?</p>
        <div class="question" id="question"></div>
      </div>

      <div class="answer-row" id="answerRow">
        <input type="number" id="answer" inputmode="numeric" min="1" max="5" autocomplete="off" aria-label="Odpověď číslem">
        <button class="main-btn" id="okBtn" onclick="checkAnswer()">OK</button>
        <button class="main-btn hidden" id="nextBtn" onclick="continueAfterFeedback()">DALŠÍ</button>
      </div>

      <div class="feedback" id="feedback"></div>
      <button class="ghost-btn" onclick="backToMenu()">Zpět do menu</button>
    </section>
  </main>
</div>

let mode = "";
let current = null;
let streak = 0;
let testIndex = 0;
let correct = 0;
let questions = [];
let waitingForNext = false;

const menu = document.getElementById("menu");
const game = document.getElementById("game");
const answer = document.getElementById("answer");
const feedback = document.getElementById("feedback");
const okBtn = document.getElementById("okBtn");
const nextBtn = document.getElementById("nextBtn");
const questionBox = document.getElementById("questionBox");

answer.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    if (waitingForNext) continueAfterFeedback();
    else checkAnswer();
  }
});

function startChallenge() {
  mode = "challenge";
  streak = 0;
  questions = [];
  menu.classList.add("hidden");
  game.classList.remove("hidden");
  document.getElementById("modeBadge").innerText = "VÝZVA";
  nextQuestion();
}

function startTest() {
  mode = "test";
  testIndex = 0;
  correct = 0;
  questions = shuffle([...data]).slice(0, 16);
  menu.classList.add("hidden");
  game.classList.remove("hidden");
  document.getElementById("modeBadge").innerText = "TEST";
  nextQuestion();
}

function backToMenu() {
  game.classList.add("hidden");
  menu.classList.remove("hidden");
  feedback.innerHTML = "";
}

function nextQuestion() {
  waitingForNext = false;
  okBtn.classList.remove("hidden");
  nextBtn.classList.add("hidden");
  feedback.className = "feedback";
  feedback.innerHTML = "";
  questionBox.classList.remove("shake", "pop");
  void questionBox.offsetWidth;
  questionBox.classList.add("pop");

  answer.disabled = false;
  answer.value = "";
  answer.focus();

  if (mode === "challenge") {
    current = data[Math.floor(Math.random() * data.length)];
    document.getElementById("progressBadge").innerText = "Série: " + streak + " / 10";
  } else {
    current = questions[testIndex];
    document.getElementById("progressBadge").innerText = "Otázka: " + (testIndex + 1) + " / 16  •  Správně: " + correct;
  }

  document.getElementById("question").innerText = current.q;
}

function checkAnswer() {
  const raw = answer.value.trim();
  if (!raw) {
    answer.focus();
    return;
  }

  const user = Number(raw);

  if (user === current.a) {
    playSound("correct");
    feedback.className = "feedback good";
    feedback.innerHTML = "SPRÁVNĚ";

    if (mode === "challenge") {
      streak++;
      if (streak >= 10) {
        setTimeout(showChallengeWin, 450);
      } else {
        setTimeout(nextQuestion, 650);
      }
    } else {
      correct++;
      testIndex++;
      if (testIndex >= questions.length) {
        setTimeout(finishTest, 500);
      } else {
        setTimeout(nextQuestion, 650);
      }
    }
  } else {
    playSound("wrong");
    questionBox.classList.remove("shake");
    void questionBox.offsetWidth;
    questionBox.classList.add("shake");

    feedback.className = "feedback bad";
    feedback.innerHTML = 'CHYBA <span class="small-feedback">Správně: ' + current.a + '</span>';
    answer.disabled = true;
    okBtn.classList.add("hidden");
    nextBtn.classList.remove("hidden");
    nextBtn.focus();
    waitingForNext = true;

    if (mode === "challenge") {
      streak = 0;
      document.getElementById("progressBadge").innerText = "Série: 0 / 10";
    }
  }
}

function continueAfterFeedback() {
  if (!waitingForNext) return;

  if (mode === "challenge") {
    nextQuestion();
  } else {
    testIndex++;
    if (testIndex >= questions.length) finishTest();
    else nextQuestion();
  }
}

function showChallengeWin() {
  playSound("win");
  answer.disabled = true;
  okBtn.classList.add("hidden");
  nextBtn.classList.add("hidden");
  feedback.className = "feedback win";
  feedback.innerHTML = "MÁŠ JEDNIČKU! 🏆<span class='small-feedback'>Deset správných odpovědí v řadě.</span>";
  document.getElementById("progressBadge").innerText = "Splněno: 10 / 10";
}

function finishTest() {
  let grade = 5;
  if (correct >= 14) grade = 1;
  else if (correct >= 12) grade = 2;
  else if (correct >= 9) grade = 3;
  else if (correct >= 7) grade = 4;

  playSound(grade <= 2 ? "win" : "wrong");
  answer.disabled = true;
  okBtn.classList.add("hidden");
  nextBtn.classList.add("hidden");
  feedback.className = "feedback win";
  feedback.innerHTML = "ZNÁMKA: " + grade + "<span class='small-feedback'>Správně: " + correct + " / 16</span>";
  document.getElementById("progressBadge").innerText = "Test dokončen";
}

function playSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.connect(gain);
    gain.connect(ctx.destination);

    if (type === "correct") {
      osc.frequency.setValueAtTime(660, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(990, ctx.currentTime + 0.12);
      gain.gain.setValueAtTime(0.12, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
      osc.start();
      osc.stop(ctx.currentTime + 0.18);
    } else if (type === "wrong") {
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(180, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(90, ctx.currentTime + 0.22);
      gain.gain.setValueAtTime(0.10, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
      osc.start();
      osc.stop(ctx.currentTime + 0.25);
    } else {
      osc.frequency.setValueAtTime(523, ctx.currentTime);
      osc.frequency.setValueAtTime(659, ctx.currentTime + 0.10);
      osc.frequency.setValueAtTime(784, ctx.currentTime + 0.20);
      gain.gain.setValueAtTime(0.12, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.42);
      osc.start();
      osc.stop(ctx.currentTime + 0.42);
    }
  } catch(e) {}
}

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}
